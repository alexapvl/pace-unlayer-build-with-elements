    <meta name="theme-color" content="#171914" />
    <script>
      if (window.location.pathname.replace(/\/+$/, '') !== '/demo') {
        const previewPreload = document.createElement('link')
        previewPreload.rel = 'preload'
        previewPreload.as = 'image'
        previewPreload.href = '/pace-preview.webp'
        previewPreload.fetchPriority = 'high'
        document.head.append(previewPreload)
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Instrument+Sans:wght@400;500;600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />

      <link

        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Instrument+Sans:wght@400;500;600;700&display=swap"

    />

    />
    <meta name="twitter:card" content="summary_large_image" />
    <title>Pace - Agent work, ready for review</title>
